name: SwiftHub Data Data Pipeline CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-pydantic-contracts:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest==8.0.2
        
    - name: Ensure Directory Structures
      run: |
        mkdir -p logs data/production/dlq
        
    - name: Execute Pytest Validation Matrices
      run: |
        pytest tests/ -v

  dbt-dry-run:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install DBT
      run: |
        pip install dbt-duckdb==1.7.2
        
    - name: DBT Compile
      run: |
        cd dbt_project && dbt compile --target dev --vars '{"database_path": ":memory:"}'
